<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />

    <title>Cloudy • Weather</title>

    <link rel="stylesheet" href="style.css" />

    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    />

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  </head>

  <body>
    <header>
      <h1 class="logo">Cloudy</h1>
      <p class="tagline">Fast, clean weather at a glance.</p>

      <div class="search-wrap">
        <input id="search" class="search-input" placeholder="Search city" />
        <div id="suggestions" class="suggestions"></div>
      </div>

      <div id="recent" class="recent-list"></div>
    </header>

    <main>
      <section id="current" class="hero">
        <div>
          <h2 id="city"></h2>
          <div id="condition" class="condition"></div>
          <div id="temp"></div>
          <div id="details"></div>
        </div>
        <div class="metrics-grid" id="metrics"></div>
      </section>

      <section>
        <h3>Hourly Forecast</h3>
        <canvas id="hourlyChart"></canvas>
      </section>

      <section>
        <h3>7 Day Forecast</h3>
        <div id="daily" class="daily-grid"></div>
      </section>

      <section>
        <h3>Radar</h3>
        <div id="radar"></div>
      </section>
    </main>

    <script type="module" src="app.js"></script>
  </body>
</html>
